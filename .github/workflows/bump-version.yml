name: Bump Version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    name: Auto Patch Bump
    runs-on: ubuntu-latest
    # Only run if the commit was NOT from this action (prevent loops)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current version
        id: current
        run: |
          VERSION=$(python -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(.+?)\"', f.read())
              print(m.group(1) if m else '0.0.0')
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump patch version
        id: bump
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          NEW_VERSION="${major}.${minor}.$((patch + 1))"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          python -c "
          import re
          with open('pyproject.toml') as f:
              content = f.read()
          content = re.sub(
              r'version\s*=\s*\".+?\"',
              f'version = \"${NEW_VERSION}\"',
              content,
              count=1,
          )
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          "

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main --tags
